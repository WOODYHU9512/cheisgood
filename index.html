<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>化工製造所 - 解答觀看登入系統</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
      text-align: center;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 30px;
    }
    .header img {
      height: 60px;
      border-radius: 12px;
      margin-right: 15px;
    }
    .header h2 {
      margin: 0;
    }
    /* 提醒訊息樣式 */
    .reminder {
      background-color: #f0f7ff;
      border: 1px solid #cce5ff;
      color: #004085;
      padding: 12px;
      margin: 20px auto 30px auto;
      border-radius: 8px;
      max-width: 450px;
      font-size: 15px;
      line-height: 1.5;
    }
    .reminder a {
      color: #007bff;
      font-weight: bold;
      text-decoration: underline;
    }
    input {
      padding: 10px;
      font-size: 16px;
      margin: 5px;
      width: 200px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-top: 10px;
      cursor: pointer;
    }
    #result {
      margin-top: 20px;
      font-size: 18px;
      color: red;
      font-weight: bold;
    }
    footer {
      margin-top: 60px;
      font-size: 14px;
      color: #555;
      line-height: 1.6;
    }
    footer a {
      color: #0077cc;
      text-decoration: none;
    }

    @media (max-width: 600px) {
      .header {
        flex-direction: column;
      }
      .header img {
        margin: 10px 0;
        margin-right: 0;
      }
      .header h2 {
        font-size: 20px;
      }
      .reminder {
        width: 90%;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="https://raw.githubusercontent.com/WOODYHU9512/cheisgood/main/%E7%9C%9F%E6%AD%A3LOGO.jpeg" 
         alt="CHE Logo" />
    <div>
      <h2>化工製造所 - 解答觀看登入系統</h2>
    </div>
  </div>

  <div class="reminder">
    📢 各校 103-115 題目可以至 <a href="https://reurl.cc/r03DLZ" target="_blank">https://reurl.cc/r03DLZ</a> 下載
  </div>

  <form onsubmit="event.preventDefault(); login();">
    <input type="text" id="username" placeholder="帳號" required /><br />
    <input type="password" id="password" placeholder="密碼" required /><br />
    <button type="submit">登入</button>
  </form>

  <div id="result"></div>

  <footer>
    <p>若有操作相關疑問，請聯絡 <a href="https://www.facebook.com/CHEisverygood/" target="_blank">Facebook 粉專</a> 或來信 <a href="mailto:cheerfactorysolution@gmail.com">cheerfactorysolution@gmail.com</a></p>
    <p>著作權所有，侵害必究 © 化工製造所</p>
  </footer>

  <script>
    async function login(force = false) {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !password) {
        document.getElementById("result").innerText = "請輸入帳號和密碼！";
        return;
      }

      try {
        const res = await fetch("https://us-central1-access-7a3c3.cloudfunctions.net/loginWithPassword", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ username, password, force })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          localStorage.setItem("loggedInUser", username);
          localStorage.setItem("sessionToken", data.sessionToken);
          window.location.href = "pdf-select.html";
        } else if (data.needForce) {
          const confirmForce = confirm(data.message || "⚠️ 此帳號已在其他地方登入，是否強制登入？");
          if (confirmForce) {
            login(true);
          }
        } else {
          document.getElementById("result").innerText = "❌ " + (data.error || "登入失敗");
        }
      } catch (err) {
        console.error("登入錯誤：", err);
        document.getElementById("result").innerText = "🚨 無法連線 Firebase，請稍後再試。";
      }
    }
  </script>
</body>
</html>
